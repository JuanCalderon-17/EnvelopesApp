<div class="login-container">
  <div class="login-card">

    <div class="login-logo">
      <img src="/kiosko.jpg" alt="Kiosko" style="width:80px;height:80px;object-fit:cover;border-radius:50%;border:3px solid #da291c;" />
    </div>

    <h1 class="login-title">Registro de Sobres</h1>
    <p class="login-subtitle">Kioscos McDonald's</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="name">Usuario</label>
        <input
          id="name"
          type="text"
          formControlName="name"
          placeholder="Nombre de kiosko"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      @if (errorMessage) {
        <p class="error-message">{{ errorMessage }}</p>
      }

      <button type="submit" class="btn-login" [disabled]="isLoading">
        {{ isLoading ? 'Ingresando...' : 'Ingresar' }}
      </button>
    </form>

  </div>
</div>
